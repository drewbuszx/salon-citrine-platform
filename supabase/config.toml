project_id = "salon-citrine-platform-hardening"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# Keep legacy auto-grants so historical migrations match production Data API exposure.
# Pair with 0039_explicit_api_grants.sql so replay stays green when this default flips off.
auto_expose_new_tables = true

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:4322/team"
additional_redirect_urls = ["http://127.0.0.1:4322/team/auth/confirm"]
jwt_expiry = 3600
enable_signup = true
